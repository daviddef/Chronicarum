name: Chronicarum
options:
  bundleIdPrefix: com.chronicarum
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: L9SAXP2E2W
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "20"

targets:
  Chronicarum:
    type: application
    platform: iOS
    # A hand-written Info.plist rather than the generated one, so the launch screen can
    # carry a solid dark background (UILaunchScreen → UIColorName). That matches the first
    # frame of the animated SplashView, so cold-start hands off with no white flash. A
    # launch screen must be static; the animation lives in SwiftUI once the app is up.
    info:
      path: Chronicarum/Info.plist
      properties:
        CFBundleDisplayName: Chronicarum
        NSLocationWhenInUseUsageDescription: "Chronicarum uses your location to show heritage sites near you and centre the map on where you are."
        # The app only makes standard HTTPS requests (map tiles, Commons photos), which is
        # exempt. Declaring it stops TestFlight holding every build for a manual
        # export-compliance answer.
        ITSAppUsesNonExemptEncryption: false
        # All four are required because the app targets iPad and iPad multitasking demands
        # the full set — App Store validation rejects the bundle otherwise (error 90474).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: LaunchBackground
    sources:
      - path: Chronicarum
        excludes:
          - "**/.DS_Store"
          # Row-wise source of truth for the import scripts, deliberately NOT shipped:
          # the app reads the columnar build produced by scripts/build_columnar.py, which
          # loads in 967ms against 1,457ms and is 10 MB smaller. Bundling both would add
          # 40 MB of dead weight to the download.
          - "Resources/bulk_sites.json"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chronicarum.app
        PRODUCT_NAME: Chronicarum
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentGold
        TARGETED_DEVICE_FAMILY: "1,2"
