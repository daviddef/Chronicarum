name: Chronicarum
options:
  bundleIdPrefix: com.chronicarum
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Chronicarum:
    type: application
    platform: iOS
    sources:
      - path: Chronicarum
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chronicarum.app
        PRODUCT_NAME: Chronicarum
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Chronicarum
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Chronicarum uses your location to show heritage sites near you and centre the map on where you are."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentGold
        TARGETED_DEVICE_FAMILY: "1,2"
